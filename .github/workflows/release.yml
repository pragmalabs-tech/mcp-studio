name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package + checksum
        shell: bash
        run: |
          ARCHIVE="mcp-studio-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" mcp-studio
          if command -v sha256sum >/dev/null; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-studio-${{ matrix.target }}
          path: |
            mcp-studio-${{ matrix.target }}.tar.gz
            mcp-studio-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: Publish to R2
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:        auto
          AWS_EC2_METADATA_DISABLED: "true"
          ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          aws --endpoint-url "$ENDPOINT" s3 cp dist/ \
            "s3://dl-pragmalabs-tech/mcp-studio/v${VERSION}/" \
            --recursive

          aws --endpoint-url "$ENDPOINT" s3 cp install/install.sh \
            "s3://dl-pragmalabs-tech/mcp-studio/install.sh" \
            --content-type "text/x-shellscript"

          echo -n "$VERSION" | aws --endpoint-url "$ENDPOINT" s3 cp - \
            "s3://dl-pragmalabs-tech/mcp-studio/latest" \
            --content-type "text/plain"

          echo "Released v$VERSION"
