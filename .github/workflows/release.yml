name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        run: |
          cd frontend
          pnpm install --frozen-lockfile
          pnpm build

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92"
          targets: ${{ matrix.target }}

      - name: Install cross-compile tools (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package + checksum
        shell: bash
        run: |
          ARCHIVE="mcp-studio-${{ matrix.target }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" mcp-studio
          if command -v sha256sum >/dev/null; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-studio-${{ matrix.target }}
          path: |
            mcp-studio-${{ matrix.target }}.tar.gz
            mcp-studio-${{ matrix.target }}.tar.gz.sha256

  publish:
    name: Publish to R2
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID:         ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY:     ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:        auto
          AWS_EC2_METADATA_DISABLED: "true"
          ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          aws --endpoint-url "$ENDPOINT" s3 cp dist/ \
            "s3://dl-pragmalabs-tech/mcp-studio/v${VERSION}/" \
            --recursive

          aws --endpoint-url "$ENDPOINT" s3 cp install/install.sh \
            "s3://dl-pragmalabs-tech/mcp-studio/install.sh" \
            --content-type "text/x-shellscript"

          echo -n "$VERSION" | aws --endpoint-url "$ENDPOINT" s3 cp - \
            "s3://dl-pragmalabs-tech/mcp-studio/latest" \
            --content-type "text/plain"

          echo "Released v$VERSION"

  update-homebrew:
    name: Update Homebrew formula
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - name: Fetch SHA256s and update formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          BASE: https://dl.pragmalabs.tech/mcp-studio
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          SHA_ARM_MAC=$(curl -fsSL "$BASE/v${VERSION}/mcp-studio-aarch64-apple-darwin.tar.gz.sha256" | awk '{print $1}')
          SHA_X64_MAC=$(curl -fsSL "$BASE/v${VERSION}/mcp-studio-x86_64-apple-darwin.tar.gz.sha256" | awk '{print $1}')
          SHA_ARM_LIN=$(curl -fsSL "$BASE/v${VERSION}/mcp-studio-aarch64-unknown-linux-gnu.tar.gz.sha256" | awk '{print $1}')
          SHA_X64_LIN=$(curl -fsSL "$BASE/v${VERSION}/mcp-studio-x86_64-unknown-linux-gnu.tar.gz.sha256" | awk '{print $1}')

          git clone https://x-access-token:${GH_TOKEN}@github.com/pragmalabs-tech/homebrew-mcp-studio.git tap
          cd tap

          awk -v v="$VERSION" -v s0="$SHA_ARM_MAC" -v s1="$SHA_X64_MAC" -v s2="$SHA_ARM_LIN" -v s3="$SHA_X64_LIN" '
            /version "[^"]*"/ { sub(/"[^"]*"/, "\"" v "\"") }
            /sha256/ {
              sub(/"[^"]*"/, "\"" shas[i] "\"")
              shas[0]=s0; shas[1]=s1; shas[2]=s2; shas[3]=s3
              sub(/"[^"]*"/, "\"" shas[i] "\""); i++
            }
            { print }
          ' Formula/mcp-studio.rb > Formula/mcp-studio.rb.tmp
          mv Formula/mcp-studio.rb.tmp Formula/mcp-studio.rb

          git config user.email "bot@pragmalabs.tech"
          git config user.name "release-bot"
          git add Formula/mcp-studio.rb
          git commit -m "release: v${VERSION}"
          git push

  publish-npm:
    name: Publish to npm
    needs: [publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download binaries and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          BASE: https://dl.pragmalabs.tech/mcp-studio
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          declare -A TARGETS=(
            ["mcp-studio-darwin-arm64"]="aarch64-apple-darwin"
            ["mcp-studio-darwin-x64"]="x86_64-apple-darwin"
            ["mcp-studio-linux-x64"]="x86_64-unknown-linux-gnu"
            ["mcp-studio-linux-arm64"]="aarch64-unknown-linux-gnu"
          )

          # Update versions and publish platform packages
          for PKG in "${!TARGETS[@]}"; do
            TARGET="${TARGETS[$PKG]}"
            DIR="npm/${PKG}"

            # Set version
            (cd "$DIR" && npm version "$VERSION" --no-git-tag-version --allow-same-version)

            # Download and extract binary
            mkdir -p "${DIR}/bin"
            curl -fsSL "$BASE/v${VERSION}/mcp-studio-${TARGET}.tar.gz" \
              | tar -xz -C "${DIR}/bin" mcp-studio
            chmod +x "${DIR}/bin/mcp-studio"

            (cd "$DIR" && npm publish --access public)
          done

          # Publish main package
          (cd npm/mcp-studio && \
            npm version "$VERSION" --no-git-tag-version --allow-same-version && \
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              for (const k of Object.keys(pkg.optionalDependencies)) {
                pkg.optionalDependencies[k] = process.env.VERSION;
              }
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            " && \
            npm publish --access public \
          )
